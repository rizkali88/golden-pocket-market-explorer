name: Refresh Market Data And Deploy Webapp

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC. This runs Tue-Sat at 06:30 Dubai time,
    # after the prior US trading session has closed and daily data is available.
    - cron: "30 2 * * 2-6"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/refresh-and-deploy.yml"
      - "build_market_system.py"
      - "build_market_universe.py"
      - "build_research_profiles.py"
      - "golden_pocket/**"
      - "webapp/**"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Refresh Data And Package Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore data-source cache
        uses: actions/cache@v4
        with:
          path: |
            data/sec_cache
            data/research_cache
          key: market-data-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-data-cache-${{ runner.os }}-

      - name: Refresh generated market data
        id: refresh
        if: github.event_name != 'push'
        continue-on-error: true
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python build_market_system.py \
            --output-dir webapp/data \
            --universe-cache-dir data/sec_cache \
            --research-cache-dir data/research_cache \
            --user-agent "GoldenPocketMarketExplorer/1.0 contact rizkali@gmail.com" \
            --requests-per-second 4 \
            --universe-workers 4 \
            --research-workers 4 \
            --research-batch-size 20 \
            --research-pause-seconds 0.25

      - name: Commit refreshed generated data
        if: github.event_name != 'push' && steps.refresh.outcome == 'success'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tmp_dir="$(mktemp -d)"
          cp webapp/data/market_universe.js "$tmp_dir/market_universe.js"
          cp webapp/data/market_universe.json "$tmp_dir/market_universe.json"
          cp webapp/data/research_profiles.js "$tmp_dir/research_profiles.js"
          cp webapp/data/research_profiles.json "$tmp_dir/research_profiles.json"
          if [ -d webapp/data/history ]; then
            cp -R webapp/data/history "$tmp_dir/history"
          fi

          git fetch origin main
          git reset --hard origin/main
          mkdir -p webapp/data
          cp "$tmp_dir/market_universe.js" webapp/data/market_universe.js
          cp "$tmp_dir/market_universe.json" webapp/data/market_universe.json
          cp "$tmp_dir/research_profiles.js" webapp/data/research_profiles.js
          cp "$tmp_dir/research_profiles.json" webapp/data/research_profiles.json
          rm -rf webapp/data/history
          if [ -d "$tmp_dir/history" ]; then
            cp -R "$tmp_dir/history" webapp/data/history
          fi

          git add webapp/data/market_universe.js webapp/data/market_universe.json
          git add webapp/data/research_profiles.js webapp/data/research_profiles.json
          git add webapp/data/history
          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
          else
            git commit -m "Refresh generated market data"
            git push origin HEAD:main
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload webapp artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: webapp

  deploy:
    name: Deploy To GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
